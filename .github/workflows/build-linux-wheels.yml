name: Build Linux Wheels

on:
  workflow_call:

jobs:

  build-wheels:
    name: Build linux ${{ matrix.arch }} wheels
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up QEMU (for aarch64 emulation)
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Authenticate with GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull correct manylinux image
        run: |
          docker pull --platform linux/${{ matrix.arch }} ghcr.io/fedluc/qupled/qupled_manylinux_${{ matrix.arch }}

      - name: Install release tooling
        run: uv sync --only-group release

      - name: Remove stray compiled extension artifacts
        run: find src/qupled -maxdepth 1 -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.pyd' \) -delete

      - name: Build wheels using cibuildwheel
        run: .venv/bin/cibuildwheel --output-dir wheelhouse
        env:
          CIBW_PLATFORM: linux
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_CONTAINER_PLATFORM: linux/${{ matrix.arch }}
          CIBW_BUILD: "cp*-manylinux_${{ matrix.arch }}"

      - name: Upload built wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: wheelhouse/*.whl
