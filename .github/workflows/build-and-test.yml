name: Build & Test

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:
jobs:
  python_tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            install_target: brew
          - os: ubuntu-latest
            install_target: apt-get

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Sync Python dependencies
      run: uv sync --group dev --extra test --no-install-project

    - name: Install system dependencies
      run: .venv/bin/foga install --target "${{ matrix.install_target }}"

    - name: Build package
      run: .venv/bin/foga build

    - name: Run unit tests
      run: .venv/bin/foga test --runner unit

    - name: Run native tests
      if: github.event_name == 'pull_request'
      run: .venv/bin/foga test --runner native

  cpp_tests_with_mpi:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            install_target: brew
          - os: ubuntu-latest
            install_target: apt-get

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Sync Python dependencies
      run: uv sync --group dev --extra test --no-install-project

    - name: Install system dependencies
      run: .venv/bin/foga install --target "${{ matrix.install_target }}"

    - name: Run cpp tests with MPI
      run: .venv/bin/foga test cpp --runner cpp --profile mpi

  cpp_tests_without_mpi:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            install_target: brew
          - os: ubuntu-latest
            install_target: apt-get

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Sync Python dependencies
      run: uv sync --group dev --extra test --no-install-project

    - name: Install system dependencies
      run: .venv/bin/foga install --target "${{ matrix.install_target }}"

    - name: Run cpp tests without MPI
      run: .venv/bin/foga test cpp --runner cpp
