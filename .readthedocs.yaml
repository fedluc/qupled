# Required
version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  apt_packages:
    - doxygen
    - graphviz
  jobs:
    install:
      - curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="$PWD/.rtd-uv" UV_NO_MODIFY_PATH=1 sh
      - UV_PROJECT_ENVIRONMENT="$READTHEDOCS_VIRTUALENV_PATH" "$PWD/.rtd-uv/uv" sync --locked --inexact --no-dev --no-install-project --extra docs

# Build documentation in the docs/ directory with Sphinx
sphinx:
   configuration: docs/conf.py
